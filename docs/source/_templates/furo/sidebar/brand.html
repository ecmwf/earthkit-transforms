{# Override Furo's sidebar brand to show logo + version string #}
<div class="sidebar-logo-container">
  {% if theme_light_logo %}
    <img class="sidebar-logo only-light" src="{{ pathto('_static/' ~ theme_light_logo, 1) }}" alt="{{ project }}" />
  {% endif %}
  {% if theme_dark_logo %}
    <img class="sidebar-logo only-dark" src="{{ pathto('_static/' ~ theme_dark_logo, 1) }}" alt="{{ project }}" />
  {% elif theme_light_logo %}
    <img class="sidebar-logo only-dark" src="{{ pathto('_static/' ~ theme_light_logo, 1) }}" alt="{{ project }}" />
  {% endif %}
</div>
<a class="sidebar-brand centered" href="{{ pathto(master_doc) }}">
  <span class="sidebar-brand-text">Version: {{ version }}</span>
</a>
